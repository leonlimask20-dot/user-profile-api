server.port=8080

# --- Banco de dados ---
spring.datasource.url=jdbc:postgresql://localhost:5432/userprofiledb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
# Chave mínima de 256 bits exigida pelo HMAC-SHA256
jwt.secret=3f6b2a8e1d4c9f7b0e5a2c8d1f4b9e3a6c7d0f2b5e8a1c4d7f0b3e6a9c2d5f8
# 86400000 ms = 24 horas
jwt.expiration=86400000

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Permite o Swagger UI passar pelo filtro JWT sem precisar de token
springdoc.swagger-ui.operationsSorter=method
